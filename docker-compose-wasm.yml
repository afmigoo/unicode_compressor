services:
  wasm-web:
    image: ghcr.io/afmigoo/unicode_compressor:wasm-web
    build:
      context: .
      dockerfile_inline: |
        FROM rust:1.88-bookworm AS builder
        RUN cargo install --locked wasm-pack
        WORKDIR /app
        COPY rust/ ./rust/
        WORKDIR /app/rust
        RUN rustup target add wasm32-unknown-unknown
        RUN wasm-pack build --target web --release --out-dir /tmp/pkg

        FROM nginx:1.27-alpine
        COPY --from=builder /tmp/pkg /usr/share/nginx/html/pkg
        COPY docker/wasm/index.html /usr/share/nginx/html/index.html
        EXPOSE 80
    ports:
      - "8080:80"
