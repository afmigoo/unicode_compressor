<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unipress WASM Smoke Test</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; max-width: 760px; }
    label { display: block; margin-top: 1rem; font-weight: 600; }
    input, textarea, button { width: 100%; margin-top: 0.25rem; padding: 0.5rem; box-sizing: border-box; }
    textarea { min-height: 120px; }
    #result { white-space: pre-wrap; background: #f5f5f5; padding: 0.75rem; border-radius: 6px; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Unipress WASM</h1>
  <p>Basic UI for <code>encode(payload, encoder)</code>.</p>

  <label for="encoder">Encoder</label>
  <input id="encoder" value="bpe_meshcoretel_ru" />

  <label for="payload">Payload</label>
  <textarea id="payload">hello world</textarea>

  <button id="runBtn">Encode</button>
  <div id="result"></div>

  <script type="module">
    import init, { encode } from "./pkg/unipress.js";

    const resultEl = document.getElementById("result");
    const encoderEl = document.getElementById("encoder");
    const payloadEl = document.getElementById("payload");
    const runBtn = document.getElementById("runBtn");

    await init();
    resultEl.textContent = "WASM module loaded.";

    runBtn.addEventListener("click", () => {
      try {
        const output = encode(payloadEl.value, encoderEl.value);
        resultEl.textContent = output;
      } catch (err) {
        resultEl.textContent = "Error: " + (err?.message || String(err));
      }
    });
  </script>
</body>
</html>
